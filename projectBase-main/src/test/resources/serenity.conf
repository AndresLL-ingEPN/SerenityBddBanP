webdriver {
  driver = edge
  capabilities {
    browserName = "MicrosoftEdge"
    "ms:edgeOptions" {
      args = ["--start-maximized", "--window-size=1920,1080", "--remote-allow-origins=*",
        "--test-type", "--no-sandbox", "--ignore-certificate-errors",
        "--disable-popup-blocking", "--disable-default-apps",
        "--disable-infobars", "--disable-gpu"]
    }
  }
}
#headless.mode = true

#
# This section defines environment-specific configuration for different environments.
# You can define nowermal Serenity properties, such as webdriver.base.url, or custom ones
# You can find more details about this feature at https://johnfergusonsmart.com/environment-specific-configuration-in-serenity-bdd/
#

environments {
  default {
    webdriver.base.url.swaglabs = "https://www.saucedemo.com/"
  }
}

#crentials encoding - Recommendation: Use time-bound credentials

credentials {
  default {
    user.name = "Test"
  }
  default {
    pass = "c2VjcmV0X3NhdWNl"
  }
}

serenity {
  encoding = "UTF-8"
  compress.filenames = true
  take.screenshots = FOR_EACH_ACTION
  extension.packages = "co.com.screenplay.project.enhancers"
}